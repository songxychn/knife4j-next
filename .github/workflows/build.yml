name: Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    paths:
      - "knife4j/**"
      - "knife4j-front/knife4j-core/**"
      - "knife4j-front/knife4j-ui-react/**"
      - "knife4j-front/package.json"
      - "knife4j-front/package-lock.json"
      - "knife4j-vue3/**"
      - "docs-site/**"
      - "scripts/**"
      - ".github/workflows/build.yml"
      - ".github/workflows/release.yml"
      - ".java-version"
      - ".nvmrc"
      - ".editorconfig"
      - ".gitattributes"
      - "CONTRIBUTING.md"
  push:
    branches:
      - master
    paths:
      - "knife4j/**"
      - "knife4j-front/knife4j-core/**"
      - "knife4j-front/knife4j-ui-react/**"
      - "knife4j-front/package.json"
      - "knife4j-front/package-lock.json"
      - "knife4j-vue3/**"
      - "docs-site/**"
      - "scripts/**"
      - ".github/workflows/build.yml"
      - ".github/workflows/release.yml"
      - ".java-version"
      - ".nvmrc"
      - ".editorconfig"
      - ".gitattributes"
      - "CONTRIBUTING.md"

jobs:
  java-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: knife4j-front/package-lock.json

      - name: Set up pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('knife4j-vue3/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install knife4j-front workspace dependencies
        run: npm ci
        working-directory: knife4j-front

      - name: Install knife4j-vue3 dependencies (pnpm)
        run: pnpm install --frozen-lockfile
        working-directory: knife4j-vue3

      - name: Verify Java modules
        run: scripts/test-java.sh

  front-core-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: knife4j-front/package-lock.json

      - name: Test front core
        run: scripts/test-front-core.sh

  docs-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Build docs site
        run: scripts/test-docs.sh
