name: Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    paths:
      - "knife4j/**"
      - "knife4j-front/knife4j-core/**"
      - "knife4j-front/knife4j-ui-react/**"
      - "knife4j-doc/**"
      - "scripts/**"
      - ".github/workflows/build.yml"
      - ".github/workflows/release.yml"
      - ".java-version"
      - ".nvmrc"
  push:
    branches:
      - master
    paths:
      - "knife4j/**"
      - "knife4j-front/knife4j-core/**"
      - "knife4j-front/knife4j-ui-react/**"
      - "knife4j-doc/**"
      - "scripts/**"
      - ".github/workflows/build.yml"
      - ".github/workflows/release.yml"
      - ".java-version"
      - ".nvmrc"

jobs:
  java-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: knife4j-front/knife4j-ui-react/package-lock.json

      - name: Install knife4j-ui-react dependencies
        run: npm install
        working-directory: knife4j-front/knife4j-ui-react

      - name: Verify Java modules
        run: scripts/test-java.sh

  front-core-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: knife4j-front/knife4j-core/package-lock.json

      - name: Test front core
        run: scripts/test-front-core.sh

  docs-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: knife4j-doc/package-lock.json

      - name: Build docs site
        run: scripts/test-docs.sh
