name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-rc') }}
    permissions:
      contents: read
    env:
      CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
      CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    defaults:
      run:
        working-directory: knife4j
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: knife4j-front/package-lock.json

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      - name: Install knife4j-vue3 dependencies (bun)
        run: bun install --frozen-lockfile
        working-directory: knife4j-vue3

      - name: Install knife4j-front workspace dependencies
        run: npm ci
        working-directory: knife4j-front

      - name: Publish to Maven Central
        run: |
          mvn -B -ntp -Prelease deploy \
            -pl knife4j-core,knife4j-dependencies,knife4j-openapi2-ui,knife4j-openapi3-ui,\
          knife4j-openapi2-spring-boot-starter,knife4j-openapi3-spring-boot-starter,\
          knife4j-aggregation-spring-boot-starter,knife4j-aggregation-jakarta-spring-boot-starter,\
          knife4j-openapi3-jakarta-spring-boot-starter,knife4j-gateway-spring-boot-starter,\
          knife4j-openapi3-webflux-spring-boot-starter,knife4j-openapi3-webflux-jakarta-spring-boot-starter \
            -am
